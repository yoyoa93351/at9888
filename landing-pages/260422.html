<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>AT99註冊有禮</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --at99-dark: #0f1216;
            --at99-blue: #0d6efd;
            --at99-neon: #00f2ff;
        }

        body {
            background-color: #FFF !important;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* 頁首 */
        .at99-header {
            background-color: var(--at99-dark);
            padding: 8px 12px;
            border-bottom: 1px solid #333;
            min-height: 60px;
        }

        .header-logo {
            height: 32px;
            width: auto;
            object-fit: contain;
            cursor: pointer;
        }

        .fake-login-group {
            display: flex !important;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        /* 主內容 */
        .main-container {
            max-width: 500px;
            margin: 10px auto;
            background: transparent;
            text-align: center;
        }

        .hero-img-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none !important;
        }

	/* 替換原本的 .cta-btn */
	.cta-btn {
    		position: relative;
    		overflow: hidden;
    		background: linear-gradient(90deg, #ff0055, #ff5e00); /* 亮橘紅配色更具行動力 */
    		color: white;
    		padding: 16px 0;
    		width: 90%;
    		max-width: 350px;
    		font-size: 1.4rem;
    		border-radius: 50px;
    		text-decoration: none !important;
    		display: inline-block;
    		font-weight: 900;
    		border: none;
    		box-shadow: 0 4px 15px rgba(255, 0, 85, 0.4);
    		cursor: pointer;
	}

    	/* 串流光效 */
    	.cta-btn::after {
        	content: "";
        	position: absolute;
        	top: -50%;
        	left: -60%;
        	width: 20%;
        	height: 200%;
        	background: rgba(255, 255, 255, 0.5);
        	transform: rotate(30deg);
        	transition: none;
        	animation: sweep 2.5s infinite;
    }

    @keyframes sweep {
        0% { left: -60%; }
        30% { left: 120%; }
        100% { left: 120%; }
    }

        .text-content {
            color: #000;
            padding: 0 20px;
        }

        @media (max-width: 380px) {
            .header-logo { height: 25px; }
            .btn-sm { padding: 4px 8px; font-size: 11px; }
        }
    </style>

    </script>

</head>
<body>

    <nav class="at99-header d-flex justify-content-between align-items-center">
        <img id="js-logo" src="" alt="LOGO" class="header-logo js-all-link">
        
        <div class="fake-login-group js-all-link">
            <button class="btn btn-primary btn-sm px-2 px-sm-3" style="background: linear-gradient(to bottom, #3a7bd5, #00d2ff); border:none; font-weight: bold;">登入</button>
            <button class="btn btn-outline-light btn-sm px-2 px-sm-3" style="border-radius: 20px; white-space: nowrap;">註冊</button>
        </div>
    </nav>

    <div class="container">
        <div class="main-container">
            <div class="hero-img-wrapper js-all-link">
                <img id="js-main-img" src="" alt="Promo" class="hero-img">
            </div>
            
            <div class="text-content mb-4">
                <p id="js-desc" class="opacity-75 small"></p>
            </div>

            <div id="js-btn-text" class="cta-btn js-all-link"></div>
        </div>
    </div>

    <script>
        /**
         * ==========================================
         * 快速修改區：一眼就能改這裡的內容
         * ==========================================
         */
        const CONFIG = {
            targetUrl: 'https://m.at99tw.net/Register?p=KUN01', // 跳轉網址
            logoUrl: 'https://at99casino.tw/wp-content/uploads/2024/07/logo.1-1.png',
            mainImgUrl: 'https://x188.bet/assets/images/1772250106_photo_2026-01-24_12-03-30.jpg',
            description: '你已解鎖限時活動！立即註冊領１６８!😍',
            buttonText: '👉立即註冊',
            pixelEventName: 'CompleteRegistration' // <--- 這裡改你的臉書事件名稱
        };

        // 初始化內容
        document.getElementById('js-logo').src = CONFIG.logoUrl;
        document.getElementById('js-main-img').src = CONFIG.mainImgUrl;
        document.getElementById('js-desc').innerText = CONFIG.description;
        document.getElementById('js-btn-text').innerText = CONFIG.buttonText;

        /**
         * ==========================================
         * 核心：共用事件監聽
         * ==========================================
         */
        document.querySelectorAll('.js-all-link').forEach(element => {
            element.addEventListener('click', function(e) {
                e.preventDefault();

                // ---------------------------------------------------------
                // 【 臉書像素觸發 】：只要埋好基礎代碼，下方這行就會生效
                // ---------------------------------------------------------
                if (typeof fbq === 'function') { 
                    fbq('track', CONFIG.pixelEventName); 
                }

                // 直接跳轉
                window.location.href = CONFIG.targetUrl;
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
