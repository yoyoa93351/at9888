<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>AT99 新人註冊限時活動頁</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --at-dark: #121212;
            --at-red: #E50914;
            --at-gold: #F5C518;
            --at-gray: #333333;
        }

        html {
            background-color: #040914;
        }

        body {
            background-color: #0b1121;
            background-image:
                radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.1) 0%, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0 auto;
            max-width: 480px;
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.15);
            position: relative;
            padding-bottom: 120px;
        }

        .at-header {
            background-color: rgba(11, 17, 33, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            position: sticky;
            top: 0;
            z-index: 500;
        }

        .app-info-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-icon-wrapper {
            width: 44px;
            height: 44px;
            background: #111;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .header-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
        }

        .app-text-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .app-title {
            color: #fff;
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }

        .app-desc {
            color: #aaa;
            font-size: 0.75rem;
        }

        .app-install-btn {
            background: linear-gradient(135deg, #FF3B30 0%, #E50914 100%);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(229, 9, 20, 0.3);
            transition: transform 0.1s;
        }

        .app-install-btn:active {
            transform: scale(0.95);
        }



        /* 標題裝飾 (D) */
        .header-banner {
            text-align: center;
            padding: 40px 15px 25px;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at center top, rgba(0, 242, 254, 0.15) 0%, transparent 60%);
        }

        .header-banner::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(0, 242, 254, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(600px) rotateX(60deg) translateY(-100px);
            opacity: 0.5;
            z-index: 0;
            animation: gridMove 15s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: perspective(600px) rotateX(60deg) translateY(0);
            }

            100% {
                transform: perspective(600px) rotateX(60deg) translateY(40px);
            }
        }

        .main-title {
            font-size: clamp(1.5rem, 9vw, 2.8rem);
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #FFFDE4 0%, #F5C518 40%, #D4AF37 80%, #AA7B00 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(245, 197, 24, 0.4));
            position: relative;
            z-index: 2;
            letter-spacing: 1px;
            line-height: 1.1;
            white-space: nowrap;
        }

        .sub-title {
            font-size: 1.15rem;
            color: #fff;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }

        .sub-title::after {
            content: "";
            display: block;
            width: 40px;
            height: 3px;
            background: var(--at-gold);
            margin: 8px auto 0;
            border-radius: 2px;
            box-shadow: 0 0 8px var(--at-gold);
        }

        /* Glassmorphism Steps */
        .steps-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 20px auto 5px;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 2;
        }

        .step-item {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .step-number {
            background: linear-gradient(135deg, #FF6B6B 0%, #E50914 100%);
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            line-height: 28px;
            margin-bottom: 6px;
            font-weight: 900;
            font-size: 0.9rem;
            box-shadow: 0 3px 8px rgba(229, 9, 20, 0.5);
            border: 1px solid #FF8E8E;
        }

        .step-text {
            font-size: 0.85rem;
            color: #ddd;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .step-arrow {
            color: rgba(245, 197, 24, 0.6);
            font-weight: bold;
            font-size: 1.1rem;
            animation: arrow-move 1.5s infinite;
        }

        @keyframes arrow-move {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(3px);
            }
        }

        .event-section {
            margin: 0 15px 30px;
            padding: 20px 0 5px;
            background: linear-gradient(145deg, rgba(20, 26, 43, 0.8) 0%, rgba(11, 15, 26, 0.9) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-top: 1px solid rgba(0, 242, 254, 0.4);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6), inset 0 2px 10px rgba(0, 242, 254, 0.05);
            position: relative;
        }

        .event-section::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f2fe, transparent);
            box-shadow: 0 0 10px #00f2fe;
        }

        .section-title {
            color: #fff;
            font-size: 1.35rem;
            font-weight: 900;
            margin-bottom: 15px;
            padding-left: 15px;
            display: flex;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .section-title span {
            margin-right: 10px;
            background: rgba(255, 255, 255, 0.08);
            padding: 5px;
            border-radius: 8px;
            font-size: 1.1rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .trust-badge-container {
            text-align: center;
            margin: 10px 15px 40px;
            padding: 25px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .trust-badge-title {
            font-size: 1.05rem;
            color: #ddd;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .trust-badge-item {
            background: #111;
            border: 1px solid #444;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #ccc;
        }

        .js-all-link {
            cursor: pointer;
        }

        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 12px;
            padding: 0 15px 15px 15px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .horizontal-scroll::-webkit-scrollbar {
            display: none;
        }

        .scroll-wrapper {
            position: relative;
        }

        .scroll-arrow {
            position: absolute;
            right: 5px;
            top: 45%;
            transform: translateY(-50%);
            background: rgba(11, 17, 33, 0.85);
            color: #00f2fe;
            border: 1px solid rgba(0, 242, 254, 0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 20;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8), inset 0 0 8px rgba(0, 242, 254, 0.3);
            transition: all 0.2s;
        }

        .scroll-arrow:hover {
            background: rgba(0, 242, 254, 0.2);
            color: #fff;
        }

        @media (hover: none) and (pointer: coarse) {
            .scroll-arrow {
                display: none;
            }
        }

        .scroll-item {
            flex: 0 0 85%;
            max-width: 400px;
            scroll-snap-align: center;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 1px solid #333;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
            cursor: pointer;
        }

        .scroll-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .item-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(229, 9, 20, 0.9);
            color: white;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            border: 1px solid #ff5050;
        }

        .cta-wrapper {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: linear-gradient(to top, rgba(11, 17, 33, 1) 60%, rgba(11, 17, 33, 0.8) 85%, rgba(11, 17, 33, 0));
            padding: 30px 15px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }

        .cta-guide-text {
            color: var(--at-gold);
            font-size: 1.05rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-8px);
            }

            60% {
                transform: translateY(-4px);
            }
        }

        .action-btn {
            background: linear-gradient(180deg, #FF3B30 0%, #B3000E 100%);
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            border: 2px solid #FF6B6B;
            border-radius: 12px;
            padding: 14px 0;
            width: 100%;
            max-width: 400px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 6px 0 #7A0000, 0 10px 20px rgba(0, 0, 0, 0.6);
            transition: all 0.1s;
            cursor: pointer;
            letter-spacing: 2px;
            animation: pulse-physical 2s infinite;
        }

        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #7A0000, 0 4px 10px rgba(0, 0, 0, 0.6);
            animation: none;
        }

        @keyframes pulse-physical {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <header class="at-header js-all-link">
        <div class="app-info-left">
            <div class="app-icon-wrapper">
                <img id="js-logo" src="" alt="LOGO" class="header-logo">
            </div>
            <div class="app-text-group">
                <div class="app-title">AT99 APP</div>
                <div class="app-desc">多平台體驗，開啟掌上精彩！</div>
            </div>
        </div>
        <button class="app-install-btn">立即註冊</button>
    </header>

    <main>
        <!-- D: 標題裝飾 -->
        <div class="header-banner">
            <h1 class="main-title">註冊AT99享168</h1>
            <p class="sub-title" id="js-desc"></p>

            <div
                style="display: flex; justify-content: center; align-items: center; margin: 15px 0 -70px; position: relative;">
                <img src="./assets/images/5618878.webp"
                    style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150%; max-width: 550px; z-index: 0; opacity: 0; pointer-events: none;">
                <img src="./assets/images/fireaffect.webp"
                    style="position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 160%; max-width: 600px; z-index: 0; mix-blend-mode: screen; opacity: 1; pointer-events: none; -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 95%); mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 95%);">
                <img src="./assets/images/Nephthys2.webp"
                    style="width: 90%; max-width: 520px; height: auto; display: inline-block; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6)); animation: pulse-physical 3s infinite; position: relative; z-index: 1; flex-shrink: 0;">
            </div>

            <!-- B: 領取三步驟 -->
            <div class="steps-container">
                <div class="step-item">
                    <div class="step-number">1</div>
                    <div class="step-text">在此線註冊</div>
                </div>
                <div class="step-arrow">➔</div>
                <div class="step-item">
                    <div class="step-number">2</div>
                    <div class="step-text">聯繫客服</div>
                </div>
                <div class="step-arrow">➔</div>
                <div class="step-item">
                    <div class="step-number">3</div>
                    <div class="step-text">即可領取168</div>
                </div>
            </div>
        </div>

        <section class="event-section">
            <h2 class="section-title"><span>🔥</span> 限時活動</h2>
            <div class="scroll-wrapper">
                <div class="horizontal-scroll js-all-link" id="attime-container"></div>
                <button class="scroll-arrow" onclick="scrollGallery('attime-container', event)">❯</button>
            </div>
        </section>

        <section class="event-section">
            <h2 class="section-title"><span>🌟</span> 常駐活動</h2>
            <div class="scroll-wrapper">
                <div class="horizontal-scroll js-all-link" id="always-container"></div>
                <button class="scroll-arrow" onclick="scrollGallery('always-container', event)">❯</button>
            </div>
        </section>

        <!-- C: 信任徽章 -->
        <div class="trust-badge-container">
            <div class="trust-badge-title">🛡️ 業界最高規格 安全有保障</div>
            <div style="display: flex; justify-content: center; flex-wrap: wrap; gap: 10px;">
                <span class="trust-badge-item">💳 支援 USDT 儲值</span>
                <span class="trust-badge-item">🔒 100% 安全加密</span>
                <span class="trust-badge-item">⚡ 24H 極速存提</span>
                <span class="trust-badge-item">🎧 全天候客服</span>
            </div>
        </div>
    </main>

    <div class="cta-wrapper js-all-link">
        <div class="cta-guide-text">👇 點此前往 AT99 註冊享體驗金 👇</div>
        <div class="action-btn"
            style="position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
            <img src="./assets/images/stackslots.webp"
                style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; object-fit: cover; opacity: 0.75; mix-blend-mode: overlay; z-index: 1; pointer-events: none;">
            <span id="js-btn-text"
                style="position: relative; z-index: 2; text-shadow: 0 1px 3px rgba(255,255,255,0.6);"></span>
        </div>
    </div>

    <script>
        const CONFIG = {
            targetUrl: 'https://m.at99tw.net/Register?p=KUN01',
            logoUrl: './assets/images/logo1.webp',
            description: '新玩家首儲 1000 送 1000',
            buttonText: '立即註冊領取168',
            pixelEventName: 'CompleteRegistration',
            gaId: 'G-W6E43HGMKE', // Google Analytics 追蹤 ID (填入 G- 開頭的 ID)
            fbId: '1341471834143072', // Facebook Pixel 追蹤 ID (填入純數字 ID)
            attimeImages: [
                './assets/images/AT_event/attime/1.webp',
                './assets/images/AT_event/attime/2.webp',
                './assets/images/AT_event/attime/15.webp',
                './assets/images/AT_event/attime/16.webp',
                './assets/images/AT_event/attime/17.webp'
            ],
            alwaysImages: [
                './assets/images/AT_event/always/3.webp',
                './assets/images/AT_event/always/4.webp',
                './assets/images/AT_event/always/5.webp',
                './assets/images/AT_event/always/6.webp',
                './assets/images/AT_event/always/7.webp',
                './assets/images/AT_event/always/8.webp',
                './assets/images/AT_event/always/9.webp',
                './assets/images/AT_event/always/10.webp',
                './assets/images/AT_event/always/11.webp',
                './assets/images/AT_event/always/12.webp',
                './assets/images/AT_event/always/13.webp',
                './assets/images/AT_event/always/14.webp'
            ]
        };

        // --- 追蹤代碼初始化 (GA & Pixel) ---
        if (CONFIG.gaId && CONFIG.gaId !== 'G-XXXXXXXXXX') {
            const script = document.createElement('script');
            script.async = true;
            script.src = 'https://www.googletagmanager.com/gtag/js?id=' + CONFIG.gaId;
            document.head.appendChild(script);
            window.dataLayer = window.dataLayer || [];
            function gtag() { dataLayer.push(arguments); }
            gtag('js', new Date());
            gtag('config', CONFIG.gaId);
        }
        if (CONFIG.fbId && CONFIG.fbId !== 'XXXXXXXXXXXXXXX') {
            !function (f, b, e, v, n, t, s) {
                if (f.fbq) return; n = f.fbq = function () {
                    n.callMethod ?
                        n.callMethod.apply(n, arguments) : n.queue.push(arguments)
                };
                if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
                n.queue = []; t = b.createElement(e); t.async = !0;
                t.src = v; s = b.getElementsByTagName(e)[0];
                s.parentNode.insertBefore(t, s)
            }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
            fbq('init', CONFIG.fbId);
            fbq('track', 'PageView');
        }
        // ----------------------------------

        const logoEl = document.getElementById('js-logo');
        if (logoEl) logoEl.src = CONFIG.logoUrl;

        const descEl = document.getElementById('js-desc');
        if (descEl) descEl.innerText = CONFIG.description;

        const btnTextEl = document.getElementById('js-btn-text');
        if (btnTextEl) btnTextEl.innerText = CONFIG.buttonText;

        function renderImages(containerId, imagesArray) {
            const container = document.getElementById(containerId);
            imagesArray.forEach((url, index) => {
                const div = document.createElement('div');
                div.className = 'scroll-item';
                div.innerHTML = `
                    <img src="${url}" alt="Event Banner ${index}" loading="lazy">
                    <div class="item-badge">點擊參加</div>
                `;
                container.appendChild(div);
            });
        }

        renderImages('attime-container', CONFIG.attimeImages);
        renderImages('always-container', CONFIG.alwaysImages);

        document.querySelectorAll('.js-all-link').forEach(element => {
            element.addEventListener('click', function (e) {
                e.preventDefault();

                // --- FB Pixel (Meta Pixel) ---
                if (typeof fbq === 'function') {
                    fbq('track', CONFIG.pixelEventName);
                }

                // --- GA Events Categorization ---
                if (typeof gtag === 'function') {
                    let gaEventName = 'click_conversion';
                    if (element.classList.contains('at-header')) {
                        gaEventName = 'click_top_header';
                    } else if (element.id === 'attime-container') {
                        gaEventName = 'click_limited_event';
                    } else if (element.id === 'always-container') {
                        gaEventName = 'click_always_event';
                    } else if (element.classList.contains('cta-wrapper')) {
                        gaEventName = 'click_bottom_cta';
                    }
                    gtag('event', gaEventName, {
                        'event_category': 'LandingPage',
                        'event_label': document.title
                    });
                }

                window.location.href = CONFIG.targetUrl;
            });
        });

        function scrollGallery(containerId, event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            const container = document.getElementById(containerId);
            const item = container.querySelector('.scroll-item');
            if (item) {
                const itemWidth = item.offsetWidth + 12;
                container.scrollBy({ left: itemWidth, behavior: 'smooth' });
            }
        }

        document.querySelectorAll('.horizontal-scroll').forEach(container => {
            container.addEventListener('wheel', function (e) {
                if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
                    e.preventDefault();
                    container.scrollBy({ left: e.deltaY > 0 ? 150 : -150, behavior: 'auto' });
                }
            }, { passive: false });
        });
    </script>
</body>

</html>
